<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 940" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="docShadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1160" height="940" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="580" y="44" font-size="24" font-weight="700" fill="#0B1220" text-anchor="middle" letter-spacing="-0.3">What you get back</text>
  <text x="580" y="68" font-size="13" fill="#64748B" text-anchor="middle">A skimmable decision-review document, ~60 seconds end-to-end</text>

  <!-- Document container -->
  <rect x="60" y="92" width="1040" height="820" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#docShadow)"/>

  <!-- Document header bar -->
  <rect x="60" y="92" width="1040" height="46" rx="14" fill="#0F1E3D"/>
  <rect x="60" y="120" width="1040" height="18" fill="#0F1E3D"/>
  <text x="84" y="122" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="1.5">BOARDROOM DECISION REVIEW</text>
  <text x="1076" y="122" font-size="10" fill="#94A3B8" text-anchor="end" letter-spacing="1">v1</text>

  <!-- Decision summary -->
  <text x="84" y="170" font-size="10.5" font-weight="700" fill="#1E3A8A" letter-spacing="2">DECISION</text>
  <text x="84" y="192" font-size="13.5" font-style="italic" fill="#0B1220">"Should we raise enterprise prices 25% next quarter?"</text>
  <text x="84" y="214" font-size="10.5" font-weight="700" fill="#1E3A8A" letter-spacing="2">COUNCIL</text>
  <text x="84" y="232" font-size="12" fill="#475569">CEO  ·  CFO  ·  COO  ·  CTO  ·  GC  ·  CHRO  ·  Board Chair (red team)</text>

  <line x1="84" y1="252" x2="1076" y2="252" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Table header -->
  <text x="84" y="282" font-size="14" font-weight="700" fill="#0B1220">Role-by-role perspectives</text>

  <!-- Table -->
  <g font-size="11">
    <!-- Column headers -->
    <rect x="84" y="296" width="992" height="32" fill="#F1F5F9"/>
    <text x="100" y="316" font-weight="700" fill="#334155" letter-spacing="0.5">ROLE</text>
    <text x="218" y="316" font-weight="700" fill="#334155" letter-spacing="0.5">VERDICT</text>
    <text x="356" y="316" font-weight="700" fill="#334155" letter-spacing="0.5">TOP CONCERN</text>
    <text x="824" y="316" font-weight="700" fill="#334155" letter-spacing="0.5">NUMBERS CITED</text>

    <!-- CEO row -->
    <rect x="84" y="328" width="992" height="56" fill="#FFFFFF"/>
    <rect x="84" y="328" width="3" height="56" fill="#1E3A8A"/>
    <text x="100" y="350" font-weight="700" fill="#0B1220">CEO</text>
    <text x="100" y="367" font-size="9.5" fill="#64748B">strategic</text>
    <rect x="218" y="346" width="92" height="20" rx="10" fill="#FEF3C7"/>
    <text x="264" y="360" fill="#92400E" text-anchor="middle" font-weight="600">Conditional</text>
    <text x="356" y="350" fill="#0B1220">25% increase + 30% feature parity = awkward middle-tier.</text>
    <text x="356" y="367" font-style="italic" fill="#64748B">Pick: value alternative, or close the feature gap?</text>
    <text x="824" y="358" fill="#0B1220">3-yr ARR mix shift +18%</text>

    <line x1="84" y1="384" x2="1076" y2="384" stroke="#F1F5F9"/>

    <!-- CFO row -->
    <rect x="84" y="384" width="992" height="56" fill="#FFFFFF"/>
    <rect x="84" y="384" width="3" height="56" fill="#1E3A8A"/>
    <text x="100" y="406" font-weight="700" fill="#0B1220">CFO</text>
    <text x="100" y="423" font-size="9.5" fill="#64748B">financial</text>
    <rect x="218" y="402" width="92" height="20" rx="10" fill="#FEF3C7"/>
    <text x="264" y="416" fill="#92400E" text-anchor="middle" font-weight="600">Run the math</text>
    <text x="356" y="406" fill="#0B1220">No churn-elasticity model at 25%; +18% revenue is illustrative.</text>
    <text x="356" y="423" font-style="italic" fill="#64748B">CAC payback worsens 14mo → 17mo. Cash 14mo runway.</text>
    <text x="824" y="414" fill="#0B1220">Net negative month 6–9</text>

    <line x1="84" y1="440" x2="1076" y2="440" stroke="#F1F5F9"/>

    <!-- COO row -->
    <rect x="84" y="440" width="992" height="56" fill="#FFFFFF"/>
    <rect x="84" y="440" width="3" height="56" fill="#1E3A8A"/>
    <text x="100" y="462" font-weight="700" fill="#0B1220">COO</text>
    <text x="100" y="479" font-size="9.5" fill="#64748B">execution</text>
    <rect x="218" y="458" width="92" height="20" rx="10" fill="#FEF3C7"/>
    <text x="264" y="472" fill="#92400E" text-anchor="middle" font-weight="600">Conditional</text>
    <text x="356" y="462" fill="#0B1220">CS team capacity gap for price-defense conversations.</text>
    <text x="356" y="479" font-style="italic" fill="#64748B">~300 hrs of CS load over rollout; current util 80%.</text>
    <text x="824" y="470" fill="#0B1220">8 weeks of CS capacity</text>

    <line x1="84" y1="496" x2="1076" y2="496" stroke="#F1F5F9"/>

    <!-- CTO row -->
    <rect x="84" y="496" width="992" height="56" fill="#FFFFFF"/>
    <rect x="84" y="496" width="3" height="56" fill="#1E3A8A"/>
    <text x="100" y="518" font-weight="700" fill="#0B1220">CTO</text>
    <text x="100" y="535" font-size="9.5" fill="#64748B">technical</text>
    <rect x="218" y="514" width="92" height="20" rx="10" fill="#FEF3C7"/>
    <text x="264" y="528" fill="#92400E" text-anchor="middle" font-weight="600">Adjacent risk</text>
    <text x="356" y="518" fill="#0B1220">Premium price implies premium SLA — 99.9% → 99.95% expected.</text>
    <text x="356" y="535" font-style="italic" fill="#64748B">~2 eng quarters of reliability work; $500–700k roadmap displacement.</text>
    <text x="824" y="526" fill="#0B1220">99.92% trailing 90d</text>

    <line x1="84" y1="552" x2="1076" y2="552" stroke="#F1F5F9"/>

    <!-- GC row (highlight — STOP) -->
    <rect x="84" y="552" width="992" height="56" fill="#FEF2F2"/>
    <rect x="84" y="552" width="3" height="56" fill="#991B1B"/>
    <text x="100" y="574" font-weight="700" fill="#0B1220">GC</text>
    <text x="100" y="591" font-size="9.5" fill="#64748B">legal</text>
    <rect x="218" y="570" width="92" height="20" rx="10" fill="#991B1B"/>
    <text x="264" y="584" fill="#FFFFFF" text-anchor="middle" font-weight="700">STOP</text>
    <text x="356" y="574" font-weight="600" fill="#7F1D1D">MFN clauses on existing mid-tier contracts likely trigger retroactive credits.</text>
    <text x="356" y="591" font-style="italic" fill="#991B1B">Audit top 50 contracts (4–6 weeks, outside counsel) before any announcement.</text>
    <text x="824" y="582" fill="#7F1D1D" font-weight="600">+18% rev → −5% net</text>

    <line x1="84" y1="608" x2="1076" y2="608" stroke="#F1F5F9"/>

    <!-- CHRO row -->
    <rect x="84" y="608" width="992" height="56" fill="#FFFFFF"/>
    <rect x="84" y="608" width="3" height="56" fill="#1E3A8A"/>
    <text x="100" y="630" font-weight="700" fill="#0B1220">CHRO</text>
    <text x="100" y="647" font-size="9.5" fill="#64748B">people</text>
    <rect x="218" y="626" width="92" height="20" rx="10" fill="#FEF3C7"/>
    <text x="264" y="640" fill="#92400E" text-anchor="middle" font-weight="600">Comp gating</text>
    <text x="356" y="630" fill="#0B1220">Sales comp plan and CS retention conversations not designed for this.</text>
    <text x="356" y="647" font-style="italic" fill="#64748B">12% regretted attrition risk in CS; 40 sellers' comp plans cascade.</text>
    <text x="824" y="638" fill="#0B1220">6-week CHRO timeline</text>

    <line x1="84" y1="664" x2="1076" y2="664" stroke="#F1F5F9"/>

    <!-- Board Chair row -->
    <rect x="84" y="664" width="992" height="60" fill="#FFFFFF"/>
    <rect x="84" y="664" width="3" height="60" fill="#991B1B"/>
    <text x="100" y="688" font-weight="700" fill="#0B1220">Board</text>
    <text x="100" y="703" font-weight="700" fill="#0B1220">Chair</text>
    <text x="100" y="716" font-size="9.5" fill="#991B1B" font-weight="600">red team</text>
    <rect x="218" y="684" width="92" height="20" rx="10" fill="#FEE2E2"/>
    <text x="264" y="698" fill="#991B1B" text-anchor="middle" font-weight="700">Pause</text>
    <text x="356" y="686" fill="#0B1220">Team is motivated toward yes because revenue solves a Q4 problem.</text>
    <text x="356" y="703" font-style="italic" fill="#64748B">Failure case at month 18 not modelled symmetrically with success case.</text>
    <text x="356" y="720" font-style="italic" fill="#64748B">Comparison case: hold price, invest in features, raise in 12mo.</text>
    <text x="824" y="696" fill="#0B1220">~25% of &gt;20% hikes</text>
    <text x="824" y="712" fill="#0B1220">net-negative 18mo</text>
  </g>

  <!-- Synthesis section -->
  <line x1="84" y1="744" x2="1076" y2="744" stroke="#E2E8F0" stroke-width="1"/>
  <text x="84" y="772" font-size="11" font-weight="700" fill="#1E3A8A" letter-spacing="2">SYNTHESIS</text>

  <text x="84" y="796" font-size="12" fill="#0B1220">●  <tspan font-weight="700">Where the council agrees:</tspan> price change eventually justifiable, but not decision-ready</text>
  <text x="84" y="816" font-size="12" fill="#0B1220">●  <tspan font-weight="700">Named disagreements:</tspan> GC says STOP until MFN audit; CFO says math first; CHRO says comp framework first</text>
  <text x="84" y="836" font-size="12" fill="#0B1220">●  <tspan font-weight="700">Questions not yet answered:</tspan> MFN exposure on top 50 contracts; sales comp plan rewrite; CS retention plan</text>

  <!-- Orphaned risk callout -->
  <rect x="84" y="852" width="992" height="44" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="100" y="872" font-size="10.5" font-weight="700" fill="#991B1B" letter-spacing="1.5">⚠  THE RISK NO ROLE FULLY OWNS</text>
  <text x="100" y="888" font-size="11.5" fill="#7F1D1D">CS backlash that doesn't show in numbers for 90 days but kills 12-month retention cohort metrics.</text>

  <!-- Wordmark -->
  <text x="1100" y="924" font-size="9" font-weight="600" fill="#94A3B8" text-anchor="end" letter-spacing="2">BOARDROOM</text>
</svg>
